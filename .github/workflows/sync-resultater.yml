name: Sync VM-resultater

on:
  schedule:
    # Hvert 10. min i VM-perioden (11. juni – 19. juli 2026 UTC)
    - cron: "*/10 * * * *"
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: sync-resultater
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - run: npm ci

      - name: Kjør sync
        id: sync
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: node scripts/sync-resultater.mjs

      # Aggreger poeng kun når en kamp ble ferdigspilt denne synken (eller
      # VM-vinner ble satt). Samme jobb → ingen ekstra GitHub-kjøringer, og
      # Firestore-reads holdes nede ved å hoppe over live-score-endringer.
      - name: Aggreger poeng (ved full tid)
        if: steps.sync.outputs.endret == 'true'
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: node scripts/aggreger-poeng.mjs
