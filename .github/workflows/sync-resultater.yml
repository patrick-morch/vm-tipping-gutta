name: Sync VM-resultater

on:
  schedule:
    # Synk rundt kampslutt: hvert 30. min i kampvinduet (UTC). Alle VM-kamper
    # (gruppe + sluttspill) spilles på US-kveld = europeisk natt, så vinduet
    # 18:00–06:30 UTC dekker alle. Resultat + poeng oppdateres da innen ~30 min
    # etter kampslutt, og neste :30 fanger opp overtid/straffer.
    #
    # Hvorfor ikke "*/10": GitHub struper hyppige planlagte jobber på private
    # repo (vi så */10 bli til ~hver 2. time). Færre, målrettede tidspunkt
    # kjøres mye mer pålitelig — og bruker langt færre GitHub-minutter.
    - cron: "0,30 18-23 * * *" # 18:00–23:30 UTC (20:00–01:30 norsk)
    - cron: "0,30 0-6 * * *" # 00:00–06:30 UTC (02:00–08:30 norsk)
    - cron: "0 10,14 * * *" # dagtid-sikkerhetsnett + backup
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: sync-resultater
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - run: npm ci

      - name: Kjør sync
        id: sync
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: node scripts/sync-resultater.mjs

      # Aggreger poeng kun når en kamp ble ferdigspilt denne synken (eller
      # VM-vinner ble satt). Samme jobb → ingen ekstra GitHub-kjøringer, og
      # Firestore-reads holdes nede ved å hoppe over live-score-endringer.
      - name: Aggreger poeng (ved full tid)
        if: steps.sync.outputs.endret == 'true'
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: node scripts/aggreger-poeng.mjs
