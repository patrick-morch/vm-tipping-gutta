name: Sync VM-resultater

on:
  schedule:
    # Hvert 5. min i kampvinduet (UTC). VM 2026 spilles US-ettermiddag/kveld =
    # norsk kveld/natt, så 15:00–05:55 UTC dekker alle avspark + full tid +
    # ekstraomganger. Repoet er public → ubegrenset gratis GitHub-minutter, og
    # synken er billig på Firestore: full poeng-aggregering skjer uansett bare
    # ved full tid (ikke hver kjøring), så */5 oppdaterer resultater raskt uten
    # å spise nevneverdig av Spark-kvoten.
    - cron: "*/5 15-23 * * *" # 15:00–23:55 UTC (17:00–01:55 norsk)
    - cron: "*/5 0-5 * * *" # 00:00–05:55 UTC (02:00–07:55 norsk)
    # Lett dagtid-sjekk for sene resultatkorreksjoner / knockout-oppdateringer.
    - cron: "0 9,13 * * *" # 11:00 + 15:00 norsk
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: sync-resultater
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - run: npm ci

      - name: Kjør sync
        id: sync
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: node scripts/sync-resultater.mjs

      # Aggreger poeng kun når en kamp ble ferdigspilt denne synken (eller
      # VM-vinner ble satt). Samme jobb → ingen ekstra GitHub-kjøringer, og
      # Firestore-reads holdes nede ved å hoppe over live-score-endringer.
      - name: Aggreger poeng (ved full tid)
        if: steps.sync.outputs.endret == 'true'
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: node scripts/aggreger-poeng.mjs
