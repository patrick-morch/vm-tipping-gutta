name: Aggreger poeng

on:
  schedule:
    # Daglig backup kl 10:00 Oslo (08:00 UTC, CEST). Hovedaggregeringen skjer
    # automatisk i sync-jobben straks en kamp er ferdigspilt; denne fanger opp
    # alt som måtte ha glippet (f.eks. uventet kampstatus fra TheSportsDB).
    - cron: "0 8 * * *"
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: aggreger-poeng
  cancel-in-progress: false

jobs:
  aggreger:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - name: Kjør aggregator
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: node scripts/aggreger-poeng.mjs
